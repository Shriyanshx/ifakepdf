<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 52" fill="none">
  <defs>
    <linearGradient id="docFill" x1="0" y1="0" x2="44" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#252a45"/>
      <stop offset="100%" stop-color="#1a1d27"/>
    </linearGradient>
    <linearGradient id="accentFill" x1="22" y1="2" x2="42" y2="16" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6c6fee"/>
    </linearGradient>
    <linearGradient id="sigGrad" x1="8" y1="38" x2="36" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6c6fee"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Document body -->
  <path
    d="M6 3 L26 3 L38 15 L38 49 L6 49 Z"
    fill="url(#docFill)"
    stroke="#6c6fee"
    stroke-width="1.5"
    stroke-linejoin="round"
  />

  <!-- Folded corner fill -->
  <path
    d="M26 3 L38 15 L26 15 Z"
    fill="url(#accentFill)"
    opacity="0.8"
  />

  <!-- Fold crease line -->
  <path
    d="M26 3 L26 15 L38 15"
    stroke="#6c6fee"
    stroke-width="0.75"
    stroke-linejoin="round"
    opacity="0.45"
  />

  <!-- Text line 1 -->
  <line x1="12" y1="24" x2="32" y2="24"
    stroke="#6c6fee" stroke-width="1.5"
    stroke-linecap="round" opacity="0.28"/>

  <!-- Text line 2 (shorter) -->
  <line x1="12" y1="30" x2="24" y2="30"
    stroke="#6c6fee" stroke-width="1.5"
    stroke-linecap="round" opacity="0.28"/>

  <!-- AI signature squiggle (glowing) -->
  <path
    d="M11 40 C13.5 35.5, 16.5 44.5, 20 40 C23 35.5, 26.5 44, 29 40 L31 38"
    stroke="url(#sigGrad)"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#glow)"
  />

  <!-- 4-point sparkle at fold corner -->
  <g transform="translate(32, 8)" filter="url(#glow)">
    <!-- vertical arm -->
    <line x1="0" y1="-4.5" x2="0" y2="4.5" stroke="#c7d2fe" stroke-width="1.2" stroke-linecap="round"/>
    <!-- horizontal arm -->
    <line x1="-4.5" y1="0" x2="4.5" y2="0" stroke="#c7d2fe" stroke-width="1.2" stroke-linecap="round"/>
    <!-- diagonal arms (smaller) -->
    <line x1="-2.2" y1="-2.2" x2="2.2" y2="2.2" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
    <line x1="2.2" y1="-2.2" x2="-2.2" y2="2.2" stroke="#c7d2fe" stroke-width="0.7" stroke-linecap="round" opacity="0.6"/>
    <!-- center dot -->
    <circle r="1.2" fill="#e0e7ff"/>
  </g>
</svg>
